name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: python -m pytest -q

      - name: Run BER smoke simulation
        run: python run_sim.py --num-bits 1000 --snr-min 0 --snr-max 6 --snr-step 3 --seed 7 --output-csv reports/ber_smoke_awgn.csv --output-plot reports/ber_smoke_awgn.svg

      - name: Run OFDM adaptive-QAM BER sweep
        run: python run_sim_ofdm.py --num-bits 5000 --snr-min 0 --snr-max 24 --snr-step 6 --seed 7 --output-csv reports/ber_full_ofdm_awgn.csv --output-plot reports/ber_full_ofdm_awgn.svg

      - name: Generate evidence dataset
        run: python generate_dataset.py --output data/link_conditions.csv --samples 60 --num-bits 800 --seed 7

      - name: Train link estimators
        run: python train_link_models.py --dataset data/link_conditions.csv --output-dir models --report reports/link_estimation_report.md --metrics-report reports/link_estimation_metrics.json

      - name: Build dashboard
        run: python build_dashboard.py --output-dir reports

      - name: Validate evidence artifacts
        run: |
          test -s reports/ber_smoke_awgn.csv
          test -s reports/ber_smoke_awgn.svg
          test -s reports/link_estimation_report.md
          test -s reports/link_estimation_metrics.json
          test -s reports/dashboard.html
          test -s reports/ber_full_ofdm_awgn.csv
          test -s reports/ber_full_ofdm_awgn.svg
          test -s models/metrics.json
